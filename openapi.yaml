    get:
      tags:
        - Multiroom
      summary: Individual management of the audio signal Right / left
      description: |-
        Example: http://10.10.10.254/httpapi.asp?command=multiroom:SlaveChannel:ip:channel

        Enables the Mute on Each of the devices via the IP address of the device and by this parameter to signal right only Channe0 = left and only 1 = Channel signal
      externalDocs:
        description: LinkPlayAPI by n4archive
        url: "https://github.com/n4archive/LinkPlayAPI/blob/master/api.md"
      operationId: multiroomSlaveChannel
      parameters:
        - name: "ip"
          in: path
