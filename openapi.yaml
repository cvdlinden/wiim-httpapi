        url: "https://forum.wiimhome.com/threads/api-for-wiim-amp.3306/#post-108841"
      operationId: setLightOperationBrightConfig
      parameters:
        - name: "s"
          in: path
          required: true
          schema:
            type: integer
            default: 0
          description: "autosense?"
        - name: "b"
          in: path
          required: true
          schema:
            type: integer
            default: 1
          description: "brightness?"
        - name: "d"
          in: path
          required: true
          schema:
            type: integer
            enum:
              - 0
              - 1
            default: 1
          description: "disable: 1 (off) or 0 (on)"
      responses:
        "200":
          description: Successful response
  /getMvRemoteUpdateStartCheck:
    get:
      tags:
        - Other
      summary: Update search
      description: |-
        Example: http://10.10.10.254/httpapi.asp?command=getMvRemoteUpdateStartCheck

        Search for the firmware updates available
      externalDocs:
        description: LinkPlayAPI by n4archive
        url: "https://github.com/n4archive/LinkPlayAPI/blob/master/api.md"
      operationId: getMvRemoteUpdateStartCheck
      responses:
        "200":
          description: Successful response
  /getMvRemoteUpdateStart:
    get:
      tags:
        - Other
      summary: Notification updates
      description: |-
        Example: http://10.10.10.254/httpapi.asp?command=getMvRemoteUpdateStart

        After calling the interface, if a new version is available, the device starts to download updates. At the end of the download, the update process starts.
        WARNING: DO NOT POWER OFF DURING THIS PROCESS!!
      externalDocs:
        description: LinkPlayAPI by n4archive
        url: "https://github.com/n4archive/LinkPlayAPI/blob/master/api.md"
      operationId: getMvRemoteUpdateStart
      responses:
        "200":
          description: Successful response
  /getMvRemoteUpdateStatus:
    get:
      tags:
        - Other
      summary: Status of the update process
      description: |-
        Example: http://10.10.10.254/httpapi.asp?command=getMvRemoteUpdateStatus

        Get the download progress.

        Value	Meaning
        - 10	Under review
        - 20  ...
        - 21	The verification of the downloaded update file failed
        - 22	Downloading the update file failed
        - 23	The verification of the downloaded update file failed
        - 25	Start downloading
        - 27	Download complete
        - 30	Downloading and verification completed

      externalDocs:
        description: LinkPlayAPI by n4archive
        url: "https://github.com/n4archive/LinkPlayAPI/blob/master/api.md"
      operationId: getMvRemoteUpdateStatus
      responses:
        "200":
          description: Successful response
  /getMvRomBurnPrecent:
    get:
      tags:
        - Other
      summary: Status of the update process
      description: |-
        Example: http://10.10.10.254/httpapi.asp?command=getMvRomBurnPrecent

        Status of updating

        {
          " status ":" 0 "," progress ":" 50 "
        }

        Fields	Meaning
        status	State
        progress	Progress between 0 to 100%

      externalDocs:
        description: LinkPlayAPI by n4archive
        url: "https://github.com/n4archive/LinkPlayAPI/blob/master/api.md"
      operationId: getMvRomBurnPrecent
      responses:
        "200":
          description: Successful response
  "/setSSID:{value}":
    get:
      tags:
        - Network
      summary: Change the SSID name of the device
      description: |-
        Example: http://10.10.10.254/httpapi.asp?command=setSSID:value

        Sets a new network name (SSID) of the device in hexadecimal format
      externalDocs:
        description: LinkPlayAPI by n4archive
        url: "https://github.com/n4archive/LinkPlayAPI/blob/master/api.md"
      operationId: setSSID
      parameters:
        - name: "value"
          in: path
