  # ====================================================================
  # Multiroom
  # --------------------------------------------------------------------
  /multiroom:getSlaveList:
    get:
      tags:
        - Multiroom
      summary: Get a list of LinkPlay available
      description: |-
        Example: http://10.10.10.254/httpapi.asp?command=multiroom:getSlaveList

        Allows to obtain the list of the devices using the same communication protocol.

        JSON output:
        {
          "Slaves": "1",
          "Slave_list": [
            {
              "Name": "FA5100_a3f4",
              "Mask": "0",
              "Volume": "90",
              "Mute": "0",
              "Channel": "0",
              "Ip": "10.10.10.100",
              "Version": "WIFIAudio.1.2.2321"
            }
          ]
        }

        Field	Description
        Slaves	Number of LinkPlay available
        Slave_list	Information about each Sonoé iEast case available
        name	Name
        mask	Case already in Multi-Room mode, Yes = 1, No = 0
        Volume	Volume level
        Mute	Enable Mute mode, Yes = 1, Off = 0
        Channel	Wifi channel
        ip	IP address of the LinkPlay Boot
        version	firmware version
      externalDocs:
        description: LinkPlayAPI by n4archive
        url: "https://github.com/n4archive/LinkPlayAPI/blob/master/api.md"
      operationId: multiroomGetSlaveList
      responses:
        "200":
          description: Successful response
  /multiroom:SlaveKickout:{ip}:
    get:
      tags:
        - Multiroom
      summary: Removing a LinkPlay from the multi-room
      description: |-
        Example: http://10.10.10.254/httpapi.asp?command=multiroom:SlaveKickout:ip

        Allows to remove from the multiroom mode a device Based on its IP address.
      externalDocs:
        description: LinkPlayAPI by n4archive
        url: "https://github.com/n4archive/LinkPlayAPI/blob/master/api.md"
      operationId: multiroomSlaveKickout
      parameters:
        - name: "ip"
          in: path
          required: true
          schema:
            type: string
          description: The IP address of the LinkPlay device to be removed from multi-room mode.
      responses:
        "200":
          description: Successful response
  /multiroom:SlaveMask:{ip}:
    get:
      tags:
        - Multiroom
      summary: Hide the IP address of a LinkPlay
      description: |-
        Example: http://10.10.10.254/httpapi.asp?command=multiroom:SlaveMask:ip

        Allows to integrate a multi-room mode a device Based on its IP address. It is thus rendered invisible from the IP network.
      externalDocs:
        description: LinkPlayAPI by n4archive
        url: "https://github.com/n4archive/LinkPlayAPI/blob/master/api.md"
      operationId: multiroomSlaveMask
      parameters:
        - name: "ip"
          in: path
          required: true
          schema:
            type: string
          description: The IP address of the LinkPlay device to be hidden from the IP network in multi-room mode.
      responses:
        "200":
          description: Successful response
  /multiroom:SlaveUnMask:{ip}:
    get:
      tags:
        - Multiroom
      summary: Releasing a Multi-Room Mode
      description: |-
        Example: http://10.10.10.254/httpapi.asp?command=multiroom:SlaveUnMask:ip

        Allows to release from the multi-room mode based on its IP address. It is thus visible on the IP network.
      externalDocs:
        description: LinkPlayAPI by n4archive
        url: "https://github.com/n4archive/LinkPlayAPI/blob/master/api.md"
      operationId: multiroomSlaveUnMask
      parameters:
        - name: "ip"
          in: path
          required: true
          schema:
            type: string
          description: The IP address of the LinkPlay device to be released from multi-room mode.
      responses:
        "200":
          description: Successful response
  /multiroom:SlaveVolume:{ip}:{volume}:
    get:
      tags:
        - Multiroom
      summary: Individual volume adjustment
      description: |-
        Example: http://10.10.10.254/httpapi.asp?command=multiroom:SlaveVolume:ip:volume

        Allows you to adjust the individual volume of the each of the devicees via the IP address of the device and the definition of a value going from from 1 to 100. Note: these settings will be lost when deactivating multi-room mode (kickout)
      externalDocs:
        description: LinkPlayAPI by n4archive
        url: "https://github.com/n4archive/LinkPlayAPI/blob/master/api.md"
      operationId: multiroomSlaveVolume
      parameters:
        - name: "ip"
          in: path
          required: true
          schema:
            type: string
          description: The IP address of the LinkPlay device to adjust the volume for in multi-room mode.
        - name: "volume"
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 100
          description: The volume level to set for the specified LinkPlay device, ranging from 1 to 100.
      responses:
        "200":
          description: Successful response
  /setPlayerCmd:slave_vol:{volume}:
    get:
      tags:
        - Multiroom
      summary: General Volume Adjustment
      description: |-
        Example: http://10.10.10.254/httpapi.asp?command=setPlayerCmd:slave_vol:volume

        Adjusts the overal volume of the multi-room with the definition of a value ranging from 1 to 100. Note: thesis settings will be lost When disabling multi-room mode
      externalDocs:
        description: LinkPlayAPI by n4archive
        url: "https://github.com/n4archive/LinkPlayAPI/blob/master/api.md"
      operationId: setPlayerCmdSlaveVolume
      parameters:
        - name: "volume"
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 100
          description: The overall volume level to set for multi-room mode, ranging from 1 to 100.
      responses:
        "200":
          description: Successful response
  /multiroom:SlaveMute:{ip}:{mute}:
    get:
      tags:
        - Multiroom
      summary: Individual muting
      description: |-
        Example: http://10.10.10.254/httpapi.asp?command=multiroom:SlaveMute:ip:mute

        Enables the Mute on each device via the IP address of the device and by enabling (1) and disabling (0)
      externalDocs:
        description: LinkPlayAPI by n4archive
        url: "https://github.com/n4archive/LinkPlayAPI/blob/master/api.md"
      operationId: multiroomSlaveMute
      parameters:
        - name: "ip"
          in: path
          required: true
          schema:
            type: string
          description: The IP address of the LinkPlay device to adjust the mute status for in multi-room mode.
        - name: "mute"
          in: path
          required: true
          schema:
            type: integer
            enum:
              - 0
              - 1
          description: Mute status to set for the specified LinkPlay device, where 1 enables mute and 0 disables mute.
      responses:
        "200":
          description: Successful response
  /setPlayerCmd:slave_mute:mute:
    get:
      tags:
        - Multiroom
      summary: General activation Mute
      description: |-
        Example: http://10.10.10.254/httpapi.asp?command=setPlayerCmd:slave_mute:mute

        Enables the Mute on all devices
      externalDocs:
        description: LinkPlayAPI by n4archive
        url: "https://github.com/n4archive/LinkPlayAPI/blob/master/api.md"
      operationId: setPlayerCmdSlaveMute
      responses:
        "200":
          description: Successful response
  /setPlayerCmd:slave_mute:unmute:
    get:
      tags:
        - Multiroom
      summary: General Mute Disabling
      description: |-
        Example: http://10.10.10.254/httpapi.asp?command=setPlayerCmd:slave_mute:unmute

        To disable the mute mode overall the
      externalDocs:
        description: LinkPlayAPI by n4archive
        url: "https://github.com/n4archive/LinkPlayAPI/blob/master/api.md"
      operationId: setPlayerCmdSlaveUnmute
      responses:
        "200":
          description: Successful response
