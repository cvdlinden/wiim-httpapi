openapi: 3.0.0
info:
  title: Linkplay/WiiM HTTP API
  description: |-
    HTTP API for Linkplay/WiiM devices. This API is based on the HTTP API for WiiM PRODUCTS Version 1.2, with additions from others.

    You can send 'HTTPS: Get' requests to the device, most of the responses are a simple 'OK' or in the JSON format.


    The request format is 'https://x.x.x.x/httpapi.asp?command=********'

    - Where x.x.x.x is the IP address of your WiiM device (In the descriptions, we assume the IP of the device is 10.10.10.254)
    - ******* is the actual command.


    Commands can contain both integers and strings, denoted as '%d' for integers and '%s' for strings, respectively.


    This Swagger doc uses a reverse proxy to access the device. See the description for the actual command.

    Note that Linkplay is a provider of the hardware and software for these devices. WiiM is a brand that uses Linkplay hardware and software.
    However other brands may also use Linkplay hardware and software, so this API may or may not work with other brands as well, such as Arylic.

    If a command doesn't work with your device, it may be that the command is not supported by the device or that the device is not a WiiM device. The command may also be specific to a certain version of the firmware. 

    If you have a different brand, you may want to check the documentation for that brand. You'll find commands here that are deprecated: these are commands that are no longer supported by the device or may be brand specific. You can still use them, but they may not work as expected.
  version: 1.2.0
  contact: {}

servers:
  - url: "http://localhost:3000/proxy"
    description: Reverse proxy to access the device. The actual devices are set using config.yaml. Please see the README for more information.

tags:
  - name: Generic
    description: |-
      Generic command for testing  
      This not an actual endpoint, but a means to test for commands not explicitly defined in the HTTP API.
  - name: Device information
    description: Get the device information
  - name: Track metadata
    description: Get Current Track metadata
  - name: Playback control
    description: Get and set playback controls
  - name: Multiroom
    description: Get and set multirroom settings
  - name: Network
    description: Get the network status
  - name: Equalizer
    description: Get and set equalizer settings
  - name: Device control
    description: Control the device
  - name: Alarm clock
    description: Get and set alarm clock
  - name: Source input switch
    description: Switch between inputs
  - name: Presets
    description: |-
      Manage presets

      The WiiM Home App allows users to configure 12 presets for quick access to
      preferred radio stations, playlists, mixes, albums, or artists. Each preset is accessible through its assigned number.
  - name: Audio output control
    description: Get and set audio output mode
  - name: Bluetooth
    description: Get and set Bluetooth settings
  - name: Room correction
    description: Get and set room correction settings
  - name: Alexa
    description: Get and set Alexa settings
  - name: Amazon music
    description: Get and set Amazon Music settings
  - name: Other
    description: Existing commands, purpose unkown. To research further...

paths:

  # ====================================================================
  # Generic
  # --------------------------------------------------------------------
  /{command}:
    get:
      summary: Generic command
      description: |-
        Generic command to the device. All calls will follow the format /httpapi.asp?command={command}.


        The actual command is passed as a path parameter. With this, you can test out any command that is not explicitly defined in this API.

        The response could be a simple 'OK' or an object with data. The actual response will depend on the command sent. If you get an 'unknown command' response, the command is not supported by the device.


        Examples:
        -  'getStatusEx' will do an /httpapi.asp?command=getStatusEx
        -  'setPlayerCmd:pause' will do an /httpapi.asp?command=setPlayerCmd:pause
        -  'setPlayerCmd:resume' will do an /httpapi.asp?command=setPlayerCmd:resume

      externalDocs:
        description: HTTP API for WiiM PRODUCTS Version 1.2
        url: "https://www.wiimhome.com/pdf/HTTP%20API%20for%20WiiM%20Products.pdf"
      parameters:
        - name: command
          description: The actual command to send to the device. Note that the command is case-sensitive.
          in: path
          required: true
          schema:
            type: string
          example: getStatusEx
      responses:
        "200":
          description: Successful response
          content:
            text/html:
              schema:
                type: string
              examples:
                OK:
                  summary: Response OK
                  value: OK
                object:
                  summary: Response Object
                  value: '{"foo":"bar"}'
                unknown-command:
                  summary: Response 'Unknown command'
                  value: "unknown command"
      tags:
        - Generic
      operationId: genericCommand

  # ====================================================================
  # Device information
  # --------------------------------------------------------------------
  /getStatusEx:
    get:
      tags:
        - Device information
      summary: Get device information
      description: |-
        Makes a call to https://10.10.10.254/httpapi.asp?command=getStatusEx

        Retrieves detailed informations about a connected device.

        The documented output may or may not be complete or differ from what the device actually reports.
      externalDocs:
        description: HTTP API for WiiM PRODUCTS Version 1.2
        url: "https://www.wiimhome.com/pdf/HTTP%20API%20for%20WiiM%20Products.pdf"
      operationId: getStatusEx
      responses:
        "200":
          description: Successful response
          content:
            text/html:
              schema:
                $ref: "#/components/schemas/DeviceStatus"
      parameters: []
  /getDebugInfo:
    get:
      tags:
        - Device information
      summary: Get device debug information
      description: |-
        Makes a call to https://10.10.10.254/httpapi.asp?command=getDebugInfo

        Retrieves debug information about a connected device.

        The documented output may or may not be complete or differ from what the device actually reports.
      externalDocs:
        description: ...
        url: ...
      operationId: getDebugInfo
      responses:
        "200":
          description: Successful response
          content:
            text/html:
              schema:
                $ref: "#/components/schemas/DeviceDebugInfo"
      parameters: []

  # ====================================================================
  # Track Metadata
  # --------------------------------------------------------------------
  /getMetaInfo:
    get:
      summary: Get Current Track Metadata
      description: |-
        JSON Response
        {
         "metaData": {
          "album": "Country Heat",
          "title": "Old Dirt Roads",
          "subtitle": "",
          "artist": "Owen Riegling",
          "albumArtURI ": "https://m.media-amazon.com/images/I/51iU0odzJwL.jpg",
          "sampleRate ": "44100",
          "bitDepth": "16",
          "bitRate": "63",
          "trackId": "s6707",
         }
        }
      externalDocs:
        description: HTTP API for WiiM PRODUCTS Version 1.2
        url: "https://www.wiimhome.com/pdf/HTTP%20API%20for%20WiiM%20Products.pdf"
      parameters: []
      responses:
        "200":
          description: Successful response
          content:
            text/html:
              schema:
                $ref: "#/components/schemas/TrackMetadata"
      tags:
        - Track metadata
      operationId: getMetaInfo

  # ====================================================================
  # Playback control
  # --------------------------------------------------------------------
  /getPlayerStatus:
    get:
      tags:
        - Playback control
      summary: Get the playback status
      description: "Makes a call to https://10.10.10.254/httpapi.asp?command=getPlayerStatus"
      externalDocs:
        description: HTTP API for WiiM PRODUCTS Version 1.2
        url: "https://www.wiimhome.com/pdf/HTTP%20API%20for%20WiiM%20Products.pdf"
      responses:
        "200":
          description: Successful response
          content:
            text/html:
              schema:
                $ref: "#/components/schemas/PlayerStatus"
      parameters: []
      operationId: getPlayerStatus
  "/setPlayerCmd:hex_playlist:url:{index}":
    get:
      summary: "Play a specific track from a playlist by URL and index"
      description: |
        http://10.10.10.254/httpapi.asp?command=setPlayerCmd:hex_playlist:url:<index>

        Play the URl (URI is the m3u or ASX playlist link, index is the start
        index), here, url should be hexed (please refer to 1.3)
      externalDocs:
        description: HTTP API for WiiM PRODUCTS Version 1.2
        url: "https://www.wiimhome.com/pdf/HTTP%20API%20for%20WiiM%20Products.pdf"
      parameters:
        - name: index
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful response
      tags:
        - Playback control
      deprecated: true
      operationId: setPlayerCmdHexPlaylistUrl
  "/setPlayerCmd:pause":
    get:
      summary: Pause
      description: "https://10.10.10.254/httpapi.asp?command=setPlayerCmd:pause"
      externalDocs:
        description: HTTP API for WiiM PRODUCTS Version 1.2
        url: "https://www.wiimhome.com/pdf/HTTP%20API%20for%20WiiM%20Products.pdf"
      parameters: []
      responses:
        "200":
          $ref: "#/components/responses/StringOK"
      tags:
        - Playback control
      operationId: setPlayerCmdPause
  "/setPlayerCmd:resume":
    get:
      summary: Resume
      description: "https://10.10.10.254/httpapi.asp?command=setPlayerCmd:resume"
      externalDocs:
        description: HTTP API for WiiM PRODUCTS Version 1.2
        url: "https://www.wiimhome.com/pdf/HTTP%20API%20for%20WiiM%20Products.pdf"
      parameters: []
      responses:
        "200":
          $ref: "#/components/responses/StringOK"
      tags:
        - Playback control
      operationId: setPlayerCmdResume
  "/setPlayerCmd:onepause":
    get:
      summary: Toggle pause/play
      description: |-
        https://10.10.10.254/httpapi.asp?command=setPlayerCmd:onepause

        If the state is paused, resume it; otherwise, pause it.
      externalDocs:
        description: HTTP API for WiiM PRODUCTS Version 1.2
        url: "https://www.wiimhome.com/pdf/HTTP%20API%20for%20WiiM%20Products.pdf"
      parameters: []
      responses:
        "200":
          $ref: "#/components/responses/StringOK"
      tags:
        - Playback control
      operationId: setPlayerCmdOnePause
  "/setPlayerCmd:play:{url}":
    get:
      summary: Play audio URL
      description: |-
        https://10.10.10.254/httpapi.asp?command=setPlayerCmd:play:url
        Play the URL. URL points to an audio stream address.
        Response is always 'OK' now
      externalDocs:
        description: HTTP API for WiiM PRODUCTS Version 1.2
        url: "https://www.wiimhome.com/pdf/HTTP%20API%20for%20WiiM%20Products.pdf"
      parameters:
        - name: url
          in: path
          required: true
          schema:
            type: string
            default: >-
              http://as-hls-ww-live.akamaized.net/pool_01505109/live/ww/bbc_radio_one/bbc_radio_one.isml/bbc_radio_one-audio%3d96000.norewind.m3u8
          description: URL points to an audio stream address
      responses:
        "200":
          $ref: "#/components/responses/StringOK"
      tags:
        - Playback control
      operationId: setPlayerCmdPlayUrl
  "/setPlayerCmd:playlist:{url}:{index}":
    get:
      summary: Play audio playlist
      description: |-
        https://10.10.10.254/httpapi.asp?command=setPlayerCmd:playlist:url:<index>

        Play the playlist with the URL (URL points to the m3u or ASX playlist
        link, index is the start index).

        Response is always 'OK' now.
      externalDocs:
        description: HTTP API for WiiM PRODUCTS Version 1.2
        url: "https://www.wiimhome.com/pdf/HTTP%20API%20for%20WiiM%20Products.pdf"
      parameters:
        - name: index
          in: path
          required: true
          schema:
            type: string
        - name: url
          in: path
          required: true
          schema:
            type: string
            default: >-
              https://gist.githubusercontent.com/bpsib/67089b959e4fa898af69fea59ad74bc3/raw/685789e28187c0a15da978b51d436a140d5ea207/BBC-Radio-HLS.m3u
      responses:
        "200":
          $ref: "#/components/responses/StringOK"
      tags:
        - Playback control
      operationId: setPlayerCmdPlaylistUrl
  "/setPlayerCmd:prev":
    get:
      summary: Previous
      description: "https://10.10.10.254/httpapi.asp?command=setPlayerCmd:prev"
      externalDocs:
        description: HTTP API for WiiM PRODUCTS Version 1.2
        url: "https://www.wiimhome.com/pdf/HTTP%20API%20for%20WiiM%20Products.pdf"
      parameters: []
      responses:
        "200":
          $ref: "#/components/responses/StringOK"
      tags:
        - Playback control
      operationId: setPlayerCmdPrev
  "/setPlayerCmd:next":
    get:
      summary: Next
      description: "https://10.10.10.254/httpapi.asp?command=setPlayerCmd:next"
      externalDocs:
        description: HTTP API for WiiM PRODUCTS Version 1.2
        url: "https://www.wiimhome.com/pdf/HTTP%20API%20for%20WiiM%20Products.pdf"
      parameters: []
      responses:
        "200":
          $ref: "#/components/responses/StringOK"
      tags:
        - Playback control
      operationId: setPlayerCmdNext
  "/setPlayerCmd:seek:position":
    get:
      summary: Seek
      description: |-
        https://10.10.10.254/httpapi.asp?command=setPlayerCmd:seek:position
        Position is from 0 to duration in second.
      externalDocs:
        description: HTTP API for WiiM PRODUCTS Version 1.2
        url: "https://www.wiimhome.com/pdf/HTTP%20API%20for%20WiiM%20Products.pdf"
      parameters: []
      responses:
        "200":
          $ref: "#/components/responses/StringOK"
      tags:
        - Playback control
      operationId: setPlayerCmdSeekPosition
  "/setPlayerCmd:stop":
    get:
      summary: Stop
      description: "https://10.10.10.254/httpapi.asp?command=setPlayerCmd:stop"
      externalDocs:
        description: HTTP API for WiiM PRODUCTS Version 1.2
        url: "https://www.wiimhome.com/pdf/HTTP%20API%20for%20WiiM%20Products.pdf"
      parameters: []
      responses:
        "200":
          $ref: "#/components/responses/StringOK"
      tags:
        - Playback control
      operationId: setPlayerCmdStop
  "/setPlayerCmd:vol:{value}":
    get:
      summary: Set volume
      description: |-
        https://10.10.10.254/httpapi.asp?command=setPlayerCmd:vol:value
        Value can be 0 to 100.
      externalDocs:
        description: HTTP API for WiiM PRODUCTS Version 1.2
        url: "https://www.wiimhome.com/pdf/HTTP%20API%20for%20WiiM%20Products.pdf"
      parameters:
        - name: value
          in: path
          required: true
          schema:
            type: integer
          description: Value can be 0 to 100.
      responses:
        "200":
          $ref: "#/components/responses/StringOK"
      tags:
        - Playback control
      operationId: setPlayerCmdVol
  "/setPlayerCmd:mute:{n}":
    get:
      summary: Mute
      description: |-
        https://10.10.10.254/httpapi.asp?command=setPlayerCmd:mute:n

        Mute: n=1

        Unmute: n=0

        The slave mute state will be set at the same time when it's in group
        play.
      externalDocs:
        description: HTTP API for WiiM PRODUCTS Version 1.2
        url: "https://www.wiimhome.com/pdf/HTTP%20API%20for%20WiiM%20Products.pdf"
      parameters:
        - name: "n"
          in: path
          required: true
          schema:
            type: integer
            enum:
              - 0
              - 1
            default: 1
          description: |-
            Mute: n=1
            Unmute: n=0
      responses:
        "200":
          $ref: "#/components/responses/StringOK"
      tags:
        - Playback control
      operationId: setPlayerCmdMute
  "/setPlayerCmd:loopmode:{n}":
    get:
      summary: Loop mode set
      description: |
        https://10.10.10.254/httpapi.asp?command=setPlayerCmd:loopmode:n

        n = 
        - -1: ...
        - 0: Shuffle disabled, Repeat enabled - loop
        - 1: Shuffle disabled, Repeat enabled - loop once
        - 2: Shuffle enabled, Repeat enabled - loop
        - 3: Shuffle enabled, Repeat disabled
        - 4: Shuffle disabled, Repeat disabled
        - 5: Shuffle enabled, Repeat enabled - loop once
      externalDocs:
        description: HTTP API for WiiM PRODUCTS Version 1.2
        url: "https://www.wiimhome.com/pdf/HTTP%20API%20for%20WiiM%20Products.pdf"
      parameters:
        - name: "n"
          in: path
          required: true
          schema:
            type: integer
            enum:
              - -1
              - 0
              - 1
              - 2
              - 3
              - 4
              - 5
            default: 4
          description: |-
            - -1: ...
            - 0: Shuffle disabled, Repeat enabled - loop
            - 1: Shuffle disabled, Repeat enabled - loop once
            - 2: Shuffle enabled, Repeat enabled - loop
            - 3: Shuffle enabled, Repeat disabled
            - 4: Shuffle disabled, Repeat disabled
            - 5: Shuffle enabled, Repeat enabled - loop once
      responses:
        "200":
          $ref: "#/components/responses/StringOK"
      tags:
        - Playback control
      operationId: setPlayerCmdLoopmode

  # ====================================================================
  # Network
  # --------------------------------------------------------------------
  /getStaticIpInfo:
    get:
      tags:
        - Network
      summary: Get the static IP information
      description: |-
        Makes a call to https://10.10.10.254/httpapi.asp?command=getStaticIpInfo

        If the WiiM device is configured to use DHCP, the above string values will be empty (see the ethernet related keys).
      externalDocs:
        description: WiiM Extended HTTP API by DanBrezeanu
        url: "https://github.com/DanBrezeanu/wiim-extended-http-api"
      operationId: getStaticIpInfo
      responses:
        "200":
          description: Successful response
          content:
            text/html:
              schema:
                $ref: "#/components/schemas/StaticIpInfo"
  /getStaticIP:
    get:
      tags:
        - Network
      deprecated: true
      summary: Query networking status
      description: Query current networking status
      externalDocs:
        description: Arylic Developers
        url: "https://developer.arylic.com/httpapi/#http-api"
      operationId: getStaticIP
      responses:
        "200":
          description: Successful response
          content:
            text/html:
              schema:
                type: string
      parameters: []
  /wlanGetConnectState:
    get:
      tags:
        - Network
      summary: Get the connection status
      description: |-
        Makes a call to
        https://10.10.10.254/httpapi.asp?command=wlanGetConnectState


        Note the return result is not in json.


        Return string:

        Return string Description

        PROCESS In progress

        PAIRFAIL Wrong password

        FAIL Connect fail

        OK connected

      externalDocs:
        description: HTTP API for WiiM PRODUCTS Version 1.2
        url: "https://www.wiimhome.com/pdf/HTTP%20API%20for%20WiiM%20Products.pdf"
      operationId: wlanGetConnectState
      responses:
        "200":
          description: Successful response
          content:
            text/html:
              schema:
                type: string
              examples:
                PROCESS:
                  summary: In progress
                  value: PROCESS
                PAIRFAIL:
                  summary: Wrong password
                  value: PAIRFAIL
                FAIL:
                  summary: Connect fail
                  value: FAIL
                OK:
                  summary: Connected
                  value: OK
      parameters: []
  /setWlanStaticIp:{IpAddress}:{GatewayIp}:{DnsServerIp}:
    get:
      tags:
        - Network
      summary: Set static WLAN network config
      description: |-
        Example: https://10.10.10.254/httpapi.asp?command=setWlanStaticIp:ipAddr=192.168.1.100/24:gateWay=192.168.1.1:dnsServer=8.8.8.8

        Keyword args:
        - ipAddr: Static IP address to set + netmask
        - gateWay: Gateway
        - dnsServer: The DNS Server (default: 8.8.8.8)
      externalDocs:
        description: WiiM Extended HTTP API by DanBrezeanu
        url: "https://github.com/DanBrezeanu/wiim-extended-http-api"
      operationId: setWlanStaticIp
      parameters:
        - name: IpAddress
          in: path
          required: true
          schema:
            type: string
          description: Static IP address to set + netmask
          example: "192.168.0.123/24"
        - name: GatewayIp
          in: path
          required: true
          schema:
            type: string
          example: "192.168.0.1"
          description: Gateway IP address
        - name: DnsServerIp
          in: path
          required: true
          schema:
            type: string
          description: "The DNS Server (default: 8.8.8.8)"
          example: "8.8.8.8"
      responses:
        "200":
          $ref: "#/components/responses/StringOK"
  /setEthStaticIp:{IpAddress}:{GatewayIp}:{DnsServerIp}:
    get:
      tags:
        - Network
      summary: Set static Ethernet network config
      description: |-
        Example: https://10.10.10.254/httpapi.asp?command=setEthStaticIp:ipAddr=192.168.1.100/24:gateWay=192.168.1.1:dnsServer=8.8.8.8

        Keyword args:
        - ipAddr: Static IP address to set + netmask
        - gateWay: Gateway
        - dnsServer: The DNS Server (default: 8.8.8.8)
      externalDocs:
        description: WiiM Extended HTTP API by DanBrezeanu
        url: "https://github.com/DanBrezeanu/wiim-extended-http-api"
      operationId: setEthStaticIp
      parameters:
        - name: IpAddress
          in: path
          required: true
          schema:
            type: string
          description: Static IP address to set + netmask
          example: "192.168.0.123/24"
        - name: GatewayIp
          in: path
          required: true
          schema:
            type: string
          example: "192.168.0.1"
          description: Gateway IP address
        - name: DnsServerIp
          in: path
          required: true
          schema:
            type: string
          description: "The DNS Server (default: 8.8.8.8)"
          example: "8.8.8.8"
      responses:
        "200":
          $ref: "#/components/responses/StringOK"

  # ====================================================================
  # Equalizer
  # --------------------------------------------------------------------
  /EQOn:
    get:
      summary: Turn on the EQ
      description: |-
        https://10.10.10.254/httpapi.asp?command=EQOn

      externalDocs:
        description: HTTP API for WiiM PRODUCTS Version 1.2
        url: "https://www.wiimhome.com/pdf/HTTP%20API%20for%20WiiM%20Products.pdf"
      parameters: []
      responses:
        "200":
          description: Default response
          content:
            text/html:
              schema:
                type: object
                properties:
                  status:
                    type: string
              examples:
                OK:
                  summary: OK
                  value:
                    status: OK
                FAILED:
                  summary: Failed
                  value:
                    status: Failed
      tags:
        - Equalizer
      operationId: setEQOn
  /EQOff:
    get:
      summary: Turn off the EQ setting
      description: |
        https://10.10.10.254/httpapi.asp?command=EQOff

      externalDocs:
        description: HTTP API for WiiM PRODUCTS Version 1.2
        url: "https://www.wiimhome.com/pdf/HTTP%20API%20for%20WiiM%20Products.pdf"
      parameters: []
      responses:
        "200":
          description: Default response
          content:
            text/html:
              schema:
                type: object
                properties:
                  status:
                    type: string
              examples:
                OK:
                  summary: OK
                  value:
                    status: OK
                FAILED:
                  summary: Failed
                  value:
                    status: Failed
      tags:
        - Equalizer
      operationId: setEQOff
  /EQGetStat:
    get:
      summary: Check if the EQ is ON or OFF
      description: |-
        http://10.10.10.254/httpapi.asp?command=EQGetStat

        JSON Response:
        {"EQStat":"On"} or {"EQStat":"Off"}
      externalDocs:
        description: HTTP API for WiiM PRODUCTS Version 1.2
        url: "https://www.wiimhome.com/pdf/HTTP%20API%20for%20WiiM%20Products.pdf"
      parameters: []
      responses:
        "200":
          description: Default response
          content:
            application/json:
              schema:
                type: object
                properties:
                  EQStat:
                    type: string
                    enum:
                      - On
                      - Off
      tags:
        - Equalizer
      operationId: getEQStat
  /EQGetList:
    get:
      summary: Check all the possible EQ settings
      description: |
        http://10.10.10.254/httpapi.asp?command=EQGetList


        Response:

        ["Flat", "Acoustic", "Bass Booster", "Bass Reducer", "Classical",
        "Dance", "Deep", "Electronic",

        "Hip-Hop", "Jazz", "Latin", "Loudness", "Lounge", "Piano", "Pop", "R&B",
        "Rock", "Small

        Speakers", "Spoken Word", "Treble Booster", "Treble Reducer", "Vocal
        Booster"]
      externalDocs:
        description: HTTP API for WiiM PRODUCTS Version 1.2
        url: "https://www.wiimhome.com/pdf/HTTP%20API%20for%20WiiM%20Products.pdf"
      parameters: []
      responses:
        "200":
          description: Default response
          content:
            text/html:
              schema: {}
      tags:
        - Equalizer
      operationId: getEQList
  /EQGetBand:
    get:
      summary: Get the current EQ band
      description: |
        http://10.10.10.254/httpapi.asp?command=EQGetBand

        Response:

