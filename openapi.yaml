  # ====================================================================
  # Room correction
  # --------------------------------------------------------------------
  /RoomCorrGet:
    get:
      tags:
        - Room correction
      summary: Get the current room correction settings
      description: |-
        Makes a call to https://10.10.10.254/httpapi.asp?command=RoomCorrGet

        It returns a JSON object with the current room correction settings, including the EQ levels for each band, the source name, and other related information.  
        The "EQBand" array contains objects for each EQ band, with parameters such as "mode", "freq", "q", and "gain".  
        This information can be used to understand the current room correction configuration and make informed adjustments if needed.
      externalDocs:
        description: "More (undocumented) API calls"
        url: "https://github.com/DanBrezeanu/wiim-extended-http-api/issues/3"
      operationId: roomCorrGet
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Status of the response, typically "OK" if the request was successful.
                  EQLevel:
                    type: integer
                    description: The current EQ level setting.
                  source_name:
                    type: string
                    description: The name of the current audio source.
                  EQStat:
                    type: string
                    description: The status of the EQ, such as "On" or "Off".
                  Name:
                    type: string
                    description: The name of the current room correction profile.
                  pluginURI:
                    type: string
                    description: The URI of the plugin used for room correction.
                  channelMode:
                    type: string
                    description: The channel mode, such as "Stereo".
                  EQBand:
                    type: array
                    items:
                      type: object
                      properties:
                        index:
                          type: integer
                          description: The index of the EQ band.
                        param_name:
                          type: string
                          description: The name of the parameter for this band (e.g., "a_mode", "a_freq", "a_q", "a_gain").
                        value:
                          type: number
                          description: The value of the parameter for this band.
  /RoomCorrGetMode:
    get:
      tags:
        - Room correction
      summary: Get the current room correction mode
      description: |-
        Makes a call to https://10.10.10.254/httpapi.asp?command=RoomCorrGetMode

