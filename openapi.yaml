            type: string
          description: The new SSID name to set for the device, in hexadecimal format.
      responses:
        "200":
          description: Successful response
  "/setNetwork:{n}:{password}":
    get:
      tags:
        - Network
      summary: Setting the password WIFI
      description: |-
        Example: http://10.10.10.254/httpapi.asp?command=setNetwork:1:password

        Setting a new password using letters and / or numbers and crossing of setnetwork setting: 1 (Securing WIFI network (WPAPSK) in contrast, setnetwork: 0 (OPEN) makes the network open WIFI.

        No response The system restarts after the validation of the new password.
      externalDocs:
        description: LinkPlayAPI by n4archive
        url: "https://github.com/n4archive/LinkPlayAPI/blob/master/api.md"
      operationId: setNetwork
      parameters:
        - name: "n"
          in: path
          required: true
          schema:
            type: integer
            enum:
              - 0
              - 1
          description: Network security type, where 1 secures the WIFI network with WPAPSK and 0 makes the network open.
        - name: "password"
          in: path
          required: true
          schema:
            type: string
          description: The new password to set for the WIFI network, using letters and/or numbers.
      responses:
        "200":
          description: Successful response
