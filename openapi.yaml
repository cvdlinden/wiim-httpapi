          description: The IP address of the LinkPlay device to adjust the audio channel for in multi-room mode.
        - name: "channel"
          in: path
          required: true
          schema:
            type: integer
            enum:
              - 0
              - 1
          description: Audio channel to set for the specified LinkPlay device, where 0 signals right only and 1 signals left only.
      responses:
        "200":
          description: Successful response
  /setPlayerCmd:{slave_channel}:{channel}:
    get:
      tags:
        - Multiroom
      summary: Overal management of the audio signal Right / left
      description: |-
        Example: http://10.10.10.254/httpapi.asp?command=setPlayerCmd:slave_channel:channel

        Enables the Mute on Each of devices via the IP address of the device and by this parameter to signal right only Channel= 0 and left signal only 1 = Channel
      externalDocs:
        description: LinkPlayAPI by n4archive
        url: "https://github.com/n4archive/LinkPlayAPI/blob/master/api.md"
      operationId: setPlayerCmdSlaveChannel
      parameters:
        - name: "slave_channel"
