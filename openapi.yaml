      in: path
      required: true
      schema:
        type: string
        example: "9c:2a:be:2e:ce:f1"

  #-------------------------------
  # Reusable responses
  #-------------------------------
  responses:
    StringOK: # Can be referenced as "#/components/responses/StringOK"
      description: Successful response
